# Language configuration for all messages sent by BuildersUtilities.
# Message formatting syntax is MiniMessage: https://docs.papermc.io/adventure/minimessage/

# Server prefix. Use {prefix} to reference in any message.
prefix: "<gradient:#5D5D5D:#D7D7D7><bold>BTE Corse</bold></gradient><dark_gray><bold>»</bold></dark_gray>"

commands:
  advanced-fly:
    enabled: "{prefix} <#66FF99>Advanced Fly enabled."
    disabled: "{prefix} <#FF6699>Advanced Fly disabled."
  night-vision:
    enabled: "{prefix} <#66FF99>Night Vision enabled."
    disabled: "{prefix} <#FF6699>Night Vision disabled."
  noclip:
    enabled: "{prefix} <#66FF99>Noclip enabled."
    disabled: "{prefix} <#FF6699>Noclip disabled."
  rc: "{prefix} <#99FFFF>Reloaded the chunks around you."
  reload:
    success: "{prefix} <#99FFFF>Configuration reloaded successfully."
    failure: "{prefix} <#FF6699>Failed to load configuration, check console."
  no-permission: ""
  help:
    header: "{prefix} <gray>Available commands:"
    lines:
      - "<#6699FF>/bu <gray>→ <white>Open ability menu"
      - "<#6699FF>/bloc <gray>→ <white>Open special items"
      - "<#6699FF>/ac <gray>→ <white>Armor color creator"
      - "<#6699FF>/bn <gray>→ <white>Banner creator"
      - "<#6699FF>/af [on|off] <gray>→ <white>Toggle advanced fly"
      - "<#6699FF>/nv [on|off] <gray>→ <white>Toggle night vision"
      - "<#6699FF>/nc [on|off] <gray>→ <white>Toggle noclip"
      - "<#6699FF>/bu rc <gray>→ <white>Reload chunks"
      - "<#6699FF>/bu reload <gray>→ <white>Reload config"
  waypoint:
    added: "{prefix} <#66FF99>Waypoint <white>{name}</white> saved."
    removed: "{prefix} <#FF6699>Waypoint <white>{name}</white> deleted."
    not-found: "{prefix} <#FF6699>Waypoint <white>{name}</white> not found."
    teleported: "{prefix} <#66FF99>Teleported to <white>{name}</white>."
    list-header: "{prefix} <gray>Your waypoints:"
    list-empty: "{prefix} <gray>No waypoints saved."
    list-entry: "<#6699FF> {name} <gray>({x}, {y}, {z}) <white>{world}"
  time:
    set: "{prefix} <#99FFFF>Time set to <white>{time}</white>."
  weather:
    set: "{prefix} <#99FFFF>Weather set to <white>{weather}</white>."

menus:
  armor-color:
    inventory-name: "{prefix} <#333399>Armor Color"
    change: |-
      <gray>
      <gray>Left click to increase
      <gray>Right click to decrease
      <gray>Shift click to change by 4
    get-helmet: "<#66FF99>Get Helmet"
    get-chestplate: "<#66FF99>Get Chestplate"
    get-leggings: "<#66FF99>Get Leggings"
    get-boots: "<#66FF99>Get Boots"
    red: "<#FF6699>Red"
    green: "<#66FF99>Green"
    blue: "<#99FFFF>Blue"
    randomize-red: "<#FF6699>Randomize Red"
    randomize-green: "<#66FF99>Randomize Green"
    randomize-blue: "<#99FFFF>Randomize Blue"

  banner:
    base-inventory-name: "{prefix} <#333399>Select Base"
    color-inventory-name: "{prefix} <#333399>Select Color"
    pattern-inventory-name: "{prefix} <#333399>Select Pattern"
    done-inventory-name: "{prefix} <#333399>Max Patterns Reached"
    select: |-
      <gray>
      <gray>Click to select
    undo: "<gray>Undo"
    randomize: "<white>Randomly Select"
    get-banner: "<#66FF99>Get Banner"
    reset: "<#FF6699>Reset"

  special:
    inventory-name: "{prefix} <#333399>Special Items"

  ability:
    inventory-name: "{prefix} <#333399>Abilities"
    status:
      enabled: |-

        <#66FF99><bold>Enabled
        <gray>
        <gray>Click to toggle
      no-permission: |-

        <#FF9966><bold>No permission
      disabled: |-

        <#FF6699><bold>Disabled
        <gray>
        <gray>Click to toggle
    iron-door-toggle:
      name: "<#99FFFF><bold>Iron Door Toggle"
      description: |-
        <#6699FF> Allows you to toggle
        <#6699FF>iron doors/trapdoors.
    double-slab-break:
      name: "<#99FFFF><bold>Double Slab Break"
      description: |-
        <#6699FF> Allows you to break
        <#6699FF>double slabs in half.
        <gray> To use, break a
        <gray>double slab while
        <gray>holding any slab.
    glazed-terracotta-rotate:
      name: "<#99FFFF><bold>Glazed Terracotta Rotate"
      description: |-
        <#6699FF> Allows you to rotate
        <#6699FF>glazed terracotta.
        <gray> To use, right click on
        <gray>a glazed terracotta
        <gray>while sneaking.
    night-vision:
      name: "<#99FFFF><bold>Night Vision"
      description: |-
        <#6699FF> Grants you infinite
        <#6699FF>night vision.
    noclip:
      name: "<#99FFFF><bold>Noclip"
      description: |-
        <#6699FF> Intelligently toggles
        <#6699FF>you between creative
        <#6699FF>and spectator mode.
    advanced-fly:
      name: "<#99FFFF><bold>Advanced Fly"
      description: |-
        <#6699FF> Prevents you from
        <#6699FF>drifting in creative
        <#6699FF>mode flight.

# No touch!
version: 4
